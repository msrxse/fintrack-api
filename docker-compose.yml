services:
  db:
    image: postgres:16
    container_name: fintrack_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: fintrack
      POSTGRES_PASSWORD: fintrack_password
      POSTGRES_DB: fintrack_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fintrack -d fintrack_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
