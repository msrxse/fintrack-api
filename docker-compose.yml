services:
  db:
    image: postgres:16
    container_name: fintrack_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: fintrack
      POSTGRES_PASSWORD: fintrack_password
      POSTGRES_DB: fintrack_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fintrack -d fintrack_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: fintrack_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      ENV: production
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
